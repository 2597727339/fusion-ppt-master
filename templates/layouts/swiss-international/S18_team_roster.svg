<!--
  swiss-international / S18_team_roster
  Team Roster — 团队名单

  PPT Master SVG Standards:
  - No <style>, class, foreignObject, animate*, script, iframe, symbol+use
  - No rgba() — use solid opacity on children individually
  - viewBox="0 0 1280 720"
  - All text as <text> elements (no foreignObject)
  - Sharp corners, strict grid, hairline rules
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background: white -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Chrome -->
  <text x="60" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#0A0A0A" letter-spacing="0.15em" font-weight="700">TEAM · 18</text>
  <text x="1220" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" text-anchor="end" letter-spacing="0.05em">18 / 24</text>
  <line x1="60" y1="64" x2="1220" y2="64" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Title -->
  <text x="60" y="110" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" letter-spacing="0.15em" font-weight="600">ROSTER · 核心团队</text>
  <text x="60" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="200" fill="#0A0A0A">融合团队</text>

  <!-- Team roster table -->
  <!-- Header -->
  <rect x="60" y="190" width="1160" height="40" fill="#0A0A0A"/>
  <text x="80" y="216" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#FFFFFF" font-weight="600" letter-spacing="0.1em">ROLE</text>
  <text x="500" y="216" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#FFFFFF" font-weight="600" letter-spacing="0.1em">SOURCE</text>
  <text x="750" y="216" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#FFFFFF" font-weight="600" letter-spacing="0.1em">STATUS</text>

  <!-- Row 1 -->
  <line x1="60" y1="230" x2="1220" y2="230" stroke="#E5E5E5" stroke-width="1"/>
  <text x="80" y="265" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A">Narrative Architect</text>
  <text x="500" y="265" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle">dashiai-ppt-structure</text>
  <text x="750" y="265" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#E63946" font-weight="700" text-anchor="middle">MERGED</text>

  <!-- Row 2 -->
  <line x1="60" y1="280" x2="1220" y2="280" stroke="#E5E5E5" stroke-width="1"/>
  <text x="80" y="315" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A">Design Director</text>
  <text x="500" y="315" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle">huashu-design</text>
  <text x="750" y="315" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#E63946" font-weight="700" text-anchor="middle">MERGED</text>

  <!-- Row 3 -->
  <line x1="60" y1="330" x2="1220" y2="330" stroke="#E5E5E5" stroke-width="1"/>
  <text x="80" y="365" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A">Rhythm Engineer</text>
  <text x="500" y="365" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle">guizang-ppt-skill</text>
  <text x="750" y="365" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#E63946" font-weight="700" text-anchor="middle">MERGED</text>

  <!-- Row 4 -->
  <line x1="60" y1="380" x2="1220" y2="380" stroke="#E5E5E5" stroke-width="1"/>
  <text x="80" y="415" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A">Production Engine</text>
  <text x="500" y="415" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle">ppt-master</text>
  <text x="750" y="415" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#E63946" font-weight="700" text-anchor="middle">MERGED</text>

  <!-- Row 5 -->
  <line x1="60" y1="430" x2="1220" y2="430" stroke="#E5E5E5" stroke-width="1"/>
  <text x="80" y="465" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A">Orchestrator</text>
  <text x="500" y="465" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle">NEW (fusion)</text>
  <text x="750" y="465" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#E63946" font-weight="700" text-anchor="middle">MERGED</text>

  <!-- Footer note -->
  <text x="80" y="540" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#888888">All four source skills are now integrated into a single pipeline.</text>

  <!-- Foot -->
  <line x1="60" y1="650" x2="1220" y2="650" stroke="#E5E5E5" stroke-width="1"/>
</svg>
