<!--
  swiss-international / S15_masonry
  Masonry Grid — 碎形网格

  PPT Master SVG Standards:
  - No <style>, class, foreignObject, animate*, script, iframe, symbol+use
  - No rgba() — use solid opacity on children individually
  - viewBox="0 0 1280 720"
  - All text as <text> elements (no foreignObject)
  - Sharp corners, strict grid, hairline rules
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background: white -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Chrome -->
  <text x="60" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#0A0A0A" letter-spacing="0.15em" font-weight="700">METHODOLOGY · 15</text>
  <text x="1220" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" text-anchor="end" letter-spacing="0.05em">15 / 24</text>
  <line x1="60" y1="64" x2="1220" y2="64" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Title -->
  <text x="60" y="110" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" letter-spacing="0.15em" font-weight="600">MATRIX · 12 项能力</text>
  <text x="60" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="200" fill="#0A0A0A">技能矩阵</text>

  <!-- 4x3 Masonry Grid -->
  <!-- Row 1 -->
  <rect x="60" y="190" width="273" height="140" fill="#F5F5F5"/>
  <text x="80" y="230" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#E63946">01</text>
  <text x="80" y="265" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#0A0A0A">Narrative</text>
  <text x="80" y="295" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#666666">7 种叙事弧</text>

  <rect x="353" y="190" width="273" height="140" fill="#F5F5F5"/>
  <text x="373" y="230" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#E63946">02</text>
  <text x="373" y="265" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#0A0A0A">Design</text>
  <text x="373" y="295" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#666666">40 种风格</text>

  <rect x="647" y="190" width="273" height="140" fill="#F5F5F5"/>
  <text x="667" y="230" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#E63946">03</text>
  <text x="667" y="265" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#0A0A0A">Rhythm</text>
  <text x="667" y="295" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#666666">anchor/dense/breathing</text>

  <rect x="940" y="190" width="280" height="140" fill="#F5F5F5"/>
  <text x="960" y="230" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#E63946">04</text>
  <text x="960" y="265" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#0A0A0A">Anti-Slop</text>
  <text x="960" y="295" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#666666">紫色渐变/emoji图标</text>

  <!-- Row 2 -->
  <rect x="60" y="350" width="273" height="140" fill="#F5F5F5"/>
  <text x="80" y="390" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#E63946">05</text>
  <text x="80" y="425" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#0A0A0A">Template</text>
  <text x="80" y="455" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#666666">34 个布局模板</text>

  <rect x="353" y="350" width="273" height="140" fill="#F5F5F5"/>
  <text x="373" y="390" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#E63946">06</text>
  <text x="373" y="425" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#0A0A0A">Spec Lock</text>
  <text x="373" y="455" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#666666">执行契约</text>

  <rect x="647" y="350" width="273" height="140" fill="#F5F5F5"/>
  <text x="667" y="390" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#E63946">07</text>
  <text x="667" y="425" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#0A0A0A">Strategy</text>
  <text x="667" y="455" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#666666">Eight Confirmations</text>

  <rect x="940" y="350" width="280" height="140" fill="#F5F5F5"/>
  <text x="960" y="390" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#E63946">08</text>
  <text x="960" y="425" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#0A0A0A">Export</text>
  <text x="960" y="455" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#666666">SVG → PPTX</text>

  <!-- Row 3 (partial) -->
  <rect x="60" y="510" width="566" height="100" fill="#F5F5F5"/>
  <text x="80" y="550" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#E63946">09</text>
  <text x="80" y="585" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#0A0A0A">Orchestrator</text>
  <text x="80" y="610" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#666666">融合编排器 · validate / migrate / check</text>

  <rect x="647" y="510" width="573" height="100" fill="#F5F5F5"/>
  <text x="667" y="550" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#E63946">10</text>
  <text x="667" y="585" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="700" fill="#0A0A0A">Pipeline</text>
  <text x="667" y="610" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#666666">6 阶段严格串行 · 不可跳跃</text>

  <!-- Foot -->
  <line x1="60" y1="650" x2="1220" y2="650" stroke="#E5E5E5" stroke-width="1"/>
</svg>
