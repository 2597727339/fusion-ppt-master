<!--
  swiss-international / S09_step_process
  Step Process — 步骤流程

  PPT Master SVG Standards:
  - No <style>, class, foreignObject, animate*, script, iframe, symbol+use
  - No rgba() — use solid opacity on children individually
  - viewBox="0 0 1280 720"
  - All text as <text> elements (no foreignObject)
  - Sharp corners, strict grid, hairline rules
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background: white -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Chrome -->
  <text x="60" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#0A0A0A" letter-spacing="0.15em" font-weight="700">METHODOLOGY · 09</text>
  <text x="1220" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" text-anchor="end" letter-spacing="0.05em">09 / 24</text>
  <line x1="60" y1="64" x2="1220" y2="64" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Title -->
  <text x="60" y="110" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" letter-spacing="0.15em" font-weight="600">PROCESS · 五步法</text>
  <text x="60" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="200" fill="#0A0A0A">内容生产管线</text>

  <!-- Step process with connecting line -->
  <line x1="60" y1="230" x2="1220" y2="230" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Step 1 -->
  <rect x="60" y="210" width="4" height="40" fill="#0A0A0A"/>
  <text x="60" y="195" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#0A0A0A" text-anchor="middle">01</text>
  <text x="60" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#0A0A0A" text-anchor="middle">Source</text>
  <text x="60" y="310" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#666666" text-anchor="middle">PDF / DOCX / URL</text>

  <!-- Step 2 -->
  <rect x="292" y="210" width="4" height="40" fill="#0A0A0A"/>
  <text x="292" y="195" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#0A0A0A" text-anchor="middle">02</text>
  <text x="292" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#0A0A0A" text-anchor="middle">Narrative</text>
  <text x="292" y="310" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#666666" text-anchor="middle">7 种叙事弧</text>

  <!-- Step 3 -->
  <rect x="524" y="210" width="4" height="40" fill="#0A0A0A"/>
  <text x="524" y="195" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#0A0A0A" text-anchor="middle">03</text>
  <text x="524" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#0A0A0A" text-anchor="middle">Design</text>
  <text x="524" y="310" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#666666" text-anchor="middle">40 种风格</text>

  <!-- Step 4 -->
  <rect x="756" y="210" width="4" height="40" fill="#0A0A0A"/>
  <text x="756" y="195" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#0A0A0A" text-anchor="middle">04</text>
  <text x="756" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#0A0A0A" text-anchor="middle">Strategist</text>
  <text x="756" y="310" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#666666" text-anchor="middle">Eight Confirmations</text>

  <!-- Step 5 -->
  <rect x="988" y="210" width="4" height="40" fill="#E63946"/>
  <text x="988" y="195" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#E63946" text-anchor="middle">05</text>
  <text x="988" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" fill="#0A0A0A" text-anchor="middle">Execute</text>
  <text x="988" y="310" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#666666" text-anchor="middle">SVG → PPTX</text>

  <!-- Accent: arrow from step 5 -->
  <line x1="988" y1="320" x2="988" y2="340" stroke="#E63946" stroke-width="2"/>

  <!-- Foot -->
  <line x1="60" y1="650" x2="1220" y2="650" stroke="#E5E5E5" stroke-width="1"/>
</svg>
