<!--
  swiss-international / S01_index_cover
  Swiss Cover — 瑞士国际主义风格封面

  PPT Master SVG Standards:
  - No <style>, class, foreignObject, animate*, script, iframe, symbol+use
  - No rgba() — use solid opacity on children individually
  - viewBox="0 0 1280 720"
  - All text as <text> elements (no foreignObject)
  - Sharp corners (no border-radius), strict grid, hairline rules
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background: white -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Chrome: top-left kicker -->
  <text x="60" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#0A0A0A" letter-spacing="0.15em" font-weight="700">Q3 2025 REVIEW</text>

  <!-- Chrome: top-right page number -->
  <text x="1220" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" text-anchor="end" letter-spacing="0.05em">01 / 24</text>

  <!-- Hairline rule below chrome -->
  <line x1="60" y1="64" x2="1220" y2="64" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Main title area: left-aligned, large type -->
  <text x="60" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#0A0A0A" letter-spacing="-0.01em">数据驱动</text>
  <text x="60" y="350" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#0A0A0A" letter-spacing="-0.01em">决策未来</text>

  <!-- Subtitle: smaller, lighter -->
  <text x="60" y="410" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" fill="#666666">第三季度经营分析报告</text>

  <!-- Hairline rule separator -->
  <line x1="60" y1="460" x2="1220" y2="460" stroke="#0A0A0A" stroke-width="1"/>

  <!-- Metadata row -->
  <text x="60" y="500" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#888888" letter-spacing="0.05em">战略发展中心 · 2025年10月</text>

  <!-- Single accent element: small colored square (Swiss style uses color sparingly) -->
  <rect x="60" y="530" width="4" height="40" fill="#E63946"/>

  <!-- Foot: bottom-right -->
  <text x="1220" y="672" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="10" fill="#CCCCCC" text-anchor="end" letter-spacing="0.1em">CONFIDENTIAL</text>

  <!-- Hairline bottom rule -->
  <line x1="60" y1="650" x2="1220" y2="650" stroke="#E5E5E5" stroke-width="1"/>
</svg>
