<!--
  swiss-international / S10_mixed_ratio
  Mixed Ratio Grid — 混合比例网格

  PPT Master SVG Standards:
  - No <style>, class, foreignObject, animate*, script, iframe, symbol+use
  - No rgba() — use solid opacity on children individually
  - viewBox="0 0 1280 720"
  - All text as <text> elements (no foreignObject)
  - Sharp corners, strict grid, hairline rules
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background: white -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Chrome -->
  <text x="60" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#0A0A0A" letter-spacing="0.15em" font-weight="700">METHODOLOGY · 10</text>
  <text x="1220" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" text-anchor="end" letter-spacing="0.05em">10 / 24</text>
  <line x1="60" y1="64" x2="1220" y2="64" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Title -->
  <text x="60" y="110" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" letter-spacing="0.15em" font-weight="600">GRID · 混合布局</text>
  <text x="60" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="200" fill="#0A0A0A">不同尺寸，同一网格</text>

  <!-- Mixed ratio grid -->
  <!-- Large left block -->
  <rect x="60" y="190" width="580" height="280" fill="#F5F5F5"/>
  <text x="80" y="335" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#AAAAAA" text-anchor="middle">[Large · 16:10]</text>

  <!-- Small right blocks -->
  <rect x="660" y="190" width="560" height="135" fill="#F5F5F5"/>
  <text x="940" y="260" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#AAAAAA" text-anchor="middle">[Medium · 4:3]</text>

  <rect x="660" y="345" width="275" height="125" fill="#F5F5F5"/>
  <text x="797" y="412" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#AAAAAA" text-anchor="middle">[Small · 1:1]</text>

  <rect x="955" y="345" width="265" height="125" fill="#F5F5F5"/>
  <text x="1087" y="412" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#AAAAAA" text-anchor="middle">[Small · 3:2]</text>

  <!-- Bottom row -->
  <rect x="60" y="490" width="1160" height="120" fill="#F5F5F5"/>
  <text x="640" y="555" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#AAAAAA" text-anchor="middle">[Wide · 21:9]</text>

  <!-- Foot -->
  <line x1="60" y1="650" x2="1220" y2="650" stroke="#E5E5E5" stroke-width="1"/>
</svg>
