<!--
  swiss-international / S20_framed_photo
  Framed Photo — 带框图片

  PPT Master SVG Standards:
  - No <style>, class, foreignObject, animate*, script, iframe, symbol+use
  - No rgba() — use solid opacity on children individually
  - viewBox="0 0 1280 720"
  - All text as <text> elements (no foreignObject)
  - Sharp corners, strict grid, hairline rules
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background: white -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Chrome -->
  <text x="60" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#0A0A0A" letter-spacing="0.15em" font-weight="700">CASE · 20</text>
  <text x="1220" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" text-anchor="end" letter-spacing="0.05em">20 / 24</text>
  <line x1="60" y1="64" x2="1220" y2="64" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Title -->
  <text x="60" y="110" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" letter-spacing="0.15em" font-weight="600">EVIDENCE · 案例</text>
  <text x="60" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="200" fill="#0A0A0A">产品截图</text>

  <!-- Framed photo area -->
  <rect x="60" y="190" width="1160" height="380" fill="#F0F0F0"/>
  <text x="640" y="385" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#AAAAAA" text-anchor="middle">[Framed Photo · 16:10]</text>
  <text x="640" y="415" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#CCCCCC" text-anchor="middle">Product screenshot or case study image</text>

  <!-- Caption -->
  <text x="60" y="590" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#888888">Fig. 1 · Fusion orchestrator validation output</text>

  <!-- Foot -->
  <line x1="60" y1="650" x2="1220" y2="650" stroke="#E5E5E5" stroke-width="1"/>
</svg>
