<!--
  swiss-international / S05_data_table
  Data Table — 数据表格

  PPT Master SVG Standards:
  - No <style>, class, foreignObject, animate*, script, iframe, symbol+use
  - No rgba() — use solid opacity on children individually
  - viewBox="0 0 1280 720"
  - All text as <text> elements (no foreignObject)
  - Sharp corners, strict grid, hairline rules
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background: white -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Chrome -->
  <text x="60" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#0A0A0A" letter-spacing="0.15em" font-weight="700">METHODOLOGY · 05</text>
  <text x="1220" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" text-anchor="end" letter-spacing="0.05em">05 / 24</text>
  <line x1="60" y1="64" x2="1220" y2="64" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Title -->
  <text x="60" y="110" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" letter-spacing="0.15em" font-weight="600">BENCHMARK · 性能基线</text>
  <text x="60" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="200" fill="#0A0A0A">模型评分对比</text>

  <!-- Table header -->
  <rect x="60" y="190" width="1160" height="40" fill="#0A0A0A"/>
  <text x="80" y="216" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#FFFFFF" font-weight="600" letter-spacing="0.05em">MODEL</text>
  <text x="400" y="216" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#FFFFFF" font-weight="600" letter-spacing="0.05em">REASONING</text>
  <text x="600" y="216" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#FFFFFF" font-weight="600" letter-spacing="0.05em">CODING</text>
  <text x="780" y="216" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#FFFFFF" font-weight="600" letter-spacing="0.05em">FACTS</text>
  <text x="960" y="216" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#FFFFFF" font-weight="600" letter-spacing="0.05em">OVERALL</text>

  <!-- Table rows -->
  <line x1="60" y1="230" x2="1220" y2="230" stroke="#E5E5E5" stroke-width="1"/>

  <text x="80" y="265" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A">Claude Sonnet 4</text>
  <text x="400" y="265" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A" text-anchor="end">96.2</text>
  <text x="600" y="265" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A" text-anchor="end">94.8</text>
  <text x="780" y="265" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A" text-anchor="end">88.5</text>
  <text x="960" y="265" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#E63946" text-anchor="end">93.2</text>

  <line x1="60" y1="280" x2="1220" y2="280" stroke="#E5E5E5" stroke-width="1"/>

  <text x="80" y="315" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A">Opus 4</text>
  <text x="400" y="315" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A" text-anchor="end">94.1</text>
  <text x="600" y="315" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A" text-anchor="end">91.3</text>
  <text x="780" y="315" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A" text-anchor="end">91.7</text>
  <text x="960" y="315" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#0A0A0A" text-anchor="end">92.4</text>

  <line x1="60" y1="330" x2="1220" y2="330" stroke="#E5E5E5" stroke-width="1"/>

  <text x="80" y="365" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A">GPT-4o</text>
  <text x="400" y="365" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A" text-anchor="end">89.5</text>
  <text x="600" y="365" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A" text-anchor="end">87.2</text>
  <text x="780" y="365" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A" text-anchor="end">85.1</text>
  <text x="960" y="365" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#0A0A0A" text-anchor="end">87.3</text>

  <line x1="60" y1="380" x2="1220" y2="380" stroke="#E5E5E5" stroke-width="1"/>

  <text x="80" y="415" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A">Gemini Ultra</text>
  <text x="400" y="415" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A" text-anchor="end">87.3</text>
  <text x="600" y="415" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A" text-anchor="end">82.6</text>
  <text x="780" y="415" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#0A0A0A" text-anchor="end">80.9</text>
  <text x="960" y="415" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#0A0A0A" text-anchor="end">83.6</text>

  <!-- Bar visualization below table -->
  <text x="60" y="470" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" letter-spacing="0.1em" font-weight="600">OVERALL SCORE</text>

  <!-- Bar 1: Claude Sonnet 4 -->
  <text x="60" y="510" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#0A0A0A">Sonnet 4</text>
  <rect x="140" y="495" width="696" height="20" fill="#0A0A0A"/>
  <text x="850" y="510" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#0A0A0A" font-weight="600" text-anchor="end">93.2</text>

  <!-- Bar 2: Opus 4 -->
  <text x="60" y="555" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#0A0A0A">Opus 4</text>
  <rect x="140" y="540" width="684" height="20" fill="#333333"/>
  <text x="840" y="555" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#0A0A0A" font-weight="600" text-anchor="end">92.4</text>

  <!-- Bar 3: GPT-4o -->
  <text x="60" y="600" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#0A0A0A">GPT-4o</text>
  <rect x="140" y="585" width="647" height="20" fill="#888888"/>
  <text x="803" y="600" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#0A0A0A" font-weight="600" text-anchor="end">87.3</text>

  <!-- Foot -->
  <line x1="60" y1="650" x2="1220" y2="650" stroke="#E5E5E5" stroke-width="1"/>
</svg>
