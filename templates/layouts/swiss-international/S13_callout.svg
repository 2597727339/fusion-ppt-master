<!--
  swiss-international / S13_callout
  Callout Block — 引用块

  PPT Master SVG Standards:
  - No <style>, class, foreignObject, animate*, script, iframe, symbol+use
  - No rgba() — use solid opacity on children individually
  - viewBox="0 0 1280 720"
  - All text as <text> elements (no foreignObject)
  - Sharp corners, strict grid, hairline rules
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background: white -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Chrome -->
  <text x="60" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#0A0A0A" letter-spacing="0.15em" font-weight="700">METHODOLOGY · 13</text>
  <text x="1220" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" text-anchor="end" letter-spacing="0.05em">13 / 24</text>
  <line x1="60" y1="64" x2="1220" y2="64" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Title -->
  <text x="60" y="110" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" letter-spacing="0.15em" font-weight="600">TAKEAWAY · 核心洞察</text>
  <text x="60" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="200" fill="#0A0A0A">关键发现</text>

  <!-- Callout block -->
  <rect x="60" y="200" width="1160" height="300" fill="#F5F5F5"/>
  <line x1="60" y1="200" x2="60" y2="500" stroke="#E63946" stroke-width="4"/>

  <text x="120" y="260" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#0A0A0A">融合不是简单的功能叠加，</text>
  <text x="120" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#0A0A0A">而是架构层面的深度整合。</text>

  <text x="120" y="370" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#666666">
    <tspan x="120" dy="30">4 个独立 skill 各有专长，但彼此之间的传递损耗</tspan>
    <tspan x="120" dy="28">导致最终输出质量不稳定。融合的目标是消除</tspan>
    <tspan x="120" dy="28">这些传递损耗，让每个阶段的知识直接可用。</tspan>
  </text>

  <text x="120" y="470" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#888888">— Fusion-PPT-Master Design Philosophy</text>

  <!-- Foot -->
  <line x1="60" y1="650" x2="1220" y2="650" stroke="#E5E5E5" stroke-width="1"/>
</svg>
