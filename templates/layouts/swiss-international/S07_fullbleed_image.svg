<!--
  swiss-international / S07_fullbleed_image
  Full-Bleed Image — 全屏图片

  PPT Master SVG Standards:
  - No <style>, class, foreignObject, animate*, script, iframe, symbol+use
  - No rgba() — use solid opacity on children individually
  - viewBox="0 0 1280 720"
  - All text as <text> elements (no foreignObject)
  - Sharp corners, strict grid, hairline rules
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background: gray (image placeholder fills entire slide) -->
  <rect width="1280" height="720" fill="#E0E0E0"/>

  <!-- Image placeholder -->
  <text x="640" y="360" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" fill="#999999" text-anchor="middle">[Full-Bleed Image · 21:9]</text>
  <text x="640" y="390" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#BBBBBB" text-anchor="middle">Case study photo or product shot</text>

  <!-- Top chrome overlay on dark band -->
  <rect x="0" y="0" width="1280" height="64" fill="#0A0A0A" opacity="0.6"/>
  <text x="60" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#FFFFFF" letter-spacing="0.15em" font-weight="700">CASE · 07</text>
  <text x="1220" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#FFFFFF" text-anchor="end" letter-spacing="0.05em" font-weight="600">07 / 24</text>

  <!-- Bottom overlay band -->
  <rect x="0" y="620" width="1280" height="100" fill="#0A0A0A" opacity="0.6"/>
  <text x="60" y="670" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="200" fill="#FFFFFF">产品发布现场</text>
  <text x="60" y="700" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#CCCCCC">GPT-M 2.0 · 上海 · 2026</text>
</svg>
