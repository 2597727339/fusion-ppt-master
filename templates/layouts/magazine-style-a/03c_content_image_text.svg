<!--
  magazine-style-a / 03c_content_image_text
  Left Text Right Image — 左文右图

  PPT Master SVG Standards:
  - No <style>, class, foreignObject, animate*, script, iframe, symbol+use
  - No rgba() — use solid opacity on children individually
  - viewBox="0 0 1280 720"
  - All text as <text> elements (no foreignObject)
  - Light theme, dense rhythm
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background: white -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Chrome -->
  <text x="60" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#0A0A0A" letter-spacing="0.15em" font-weight="700">平台粉丝实证</text>
  <text x="1220" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" text-anchor="end" letter-spacing="0.05em">Act I / Ops · 05 / 24</text>
  <line x1="60" y1="64" x2="1220" y2="64" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Left column: text (7 parts) -->
  <text x="60" y="110" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#0A0A0A" letter-spacing="0.1em" font-weight="700">Proof · 粉丝实证</text>
  <text x="60" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#0A0A0A">10 个平台 · 6 张截图</text>

  <!-- Image placeholder area (5 parts) -->
  <!-- Placeholder for image slot -->
  <rect x="720" y="100" width="500" height="400" fill="#F0F0F0"/>
  <text x="970" y="305" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#AAAAAA" text-anchor="middle">[Image Slot · 16:10]</text>
  <text x="970" y="330" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#CCCCCC" text-anchor="middle">Product screenshot or chart</text>

  <!-- Caption -->
  <text x="740" y="520" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888">CodePilot · 产品截图</text>

  <!-- Foot -->
  <text x="60" y="672" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#888888">截图时间 · 2026.04</text>
  <text x="1220" y="672" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#888888" text-anchor="end">Page 05 · 粉丝实证</text>
  <line x1="60" y1="650" x2="1220" y2="650" stroke="#E5E5E5" stroke-width="1"/>
</svg>
