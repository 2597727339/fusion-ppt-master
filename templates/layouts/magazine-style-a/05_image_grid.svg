<!--
  magazine-style-a / 05_image_grid
  Image Grid 3x2 — 图片网格

  PPT Master SVG Standards:
  - No <style>, class, foreignObject, animate*, script, iframe, symbol+use
  - No rgba() — use solid opacity on children individually
  - viewBox="0 0 1280 720"
  - All text as <text> elements (no foreignObject)
  - Light theme, dense rhythm
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background: white -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Chrome -->
  <text x="60" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#0A0A0A" letter-spacing="0.15em" font-weight="700">平台粉丝实证</text>
  <text x="1220" y="48" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" text-anchor="end" letter-spacing="0.05em">Act I / Ops · 05 / 24</text>
  <line x1="60" y1="64" x2="1220" y2="64" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Kicker + Title -->
  <text x="60" y="110" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#0A0A0A" letter-spacing="0.1em" font-weight="700">Proof · 粉丝实证</text>
  <text x="60" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#0A0A0A">10 个平台 · 6 张截图</text>

  <!-- 3x2 Image Grid -->
  <!-- Row 1 -->
  <rect x="60" y="190" width="373" height="155" fill="#F0F0F0"/>
  <text x="246" y="275" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#AAAAAA" text-anchor="middle">[Screenshot · 微博 289K]</text>
  <text x="246" y="360" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" text-anchor="middle">微博 · 289K</text>

  <rect x="453" y="190" width="373" height="155" fill="#F0F0F0"/>
  <text x="639" y="275" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#AAAAAA" text-anchor="middle">[Screenshot · Twitter 137K]</text>
  <text x="639" y="360" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" text-anchor="middle">推特 · 137K</text>

  <rect x="847" y="190" width="373" height="155" fill="#F0F0F0"/>
  <text x="1033" y="275" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#AAAAAA" text-anchor="middle">[Screenshot · 公众号 96K]</text>
  <text x="1033" y="360" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" text-anchor="middle">公众号 · 96K</text>

  <!-- Row 2 -->
  <rect x="60" y="370" width="373" height="155" fill="#F0F0F0"/>
  <text x="246" y="455" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#AAAAAA" text-anchor="middle">[Screenshot · 即刻 26K]</text>
  <text x="246" y="540" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" text-anchor="middle">即刻 · 26K</text>

  <rect x="453" y="370" width="373" height="155" fill="#F0F0F0"/>
  <text x="639" y="455" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#AAAAAA" text-anchor="middle">[Screenshot · 小红书 19K]</text>
  <text x="639" y="540" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" text-anchor="middle">小红书 · 19K</text>

  <rect x="847" y="370" width="373" height="155" fill="#F0F0F0"/>
  <text x="1033" y="455" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#AAAAAA" text-anchor="middle">[Screenshot · 抖音 10K]</text>
  <text x="1033" y="540" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="11" fill="#888888" text-anchor="middle">抖音 · 10K</text>

  <!-- Foot -->
  <text x="60" y="672" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#888888">截图时间 · 2026.04</text>
  <text x="1220" y="672" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="12" fill="#888888" text-anchor="end">Page 05 · 粉丝实证</text>
  <line x1="60" y1="650" x2="1220" y2="650" stroke="#E5E5E5" stroke-width="1"/>
</svg>
